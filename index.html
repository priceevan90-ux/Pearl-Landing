*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --cream:      #EEE7DF;
  --dark-bg:    #1C150F;
  --taupe:      #CFC7BC;
  --stone:      #888070;
  --dark-stone: #6B6358;
}

html, body {
  height: 100%;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
}

/* ── WORDMARK ── */
.wordmark-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 30px 40px;
  pointer-events: none;
  mix-blend-mode: normal;
}

.wordmark {
  font-family: 'Promenade', Georgia, serif;
  font-size: 11px;
  letter-spacing: 0.42em;
  text-transform: uppercase;
  color: var(--taupe);
  opacity: 0.7;
}

/* ── SPLIT ── */
.split {
  display: flex;
  height: 100vh;
  width: 100vw;
}

/* ── PANELS ── */
.panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: flex 0.65s cubic-bezier(0.16, 1, 0.3, 1);
  text-decoration: none;
}

.panel:hover { flex: 1.1; }

.panel-light { background-color: #EEE7DF; }
.panel-dark  { background-color: #1C150F; }

/* ── DIVIDER ── */
.divider {
  position: fixed;
  left: 50%;
  top: 8%;
  bottom: 8%;
  width: 0.5px;
  background-color: var(--taupe);
  opacity: 0.35;
  z-index: 10;
  pointer-events: none;
  transition: opacity 0.5s ease;
}

.split:has(.panel:hover) .divider { opacity: 0.15; }

/* ── INNER ── */
.panel-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: transform 0.55s cubic-bezier(0.16, 1, 0.3, 1);
}
.panel:hover .panel-inner { transform: translateY(-8px); }

/* ── LOGO ── */
.logo-wrap {
  width: 170px;
  height: 170px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.logo-wrap img {
  width: 140px;
  height: 140px;
  object-fit: contain;
}

/* ── NAME ── */
.panel-name {
  font-family: 'Promenade', Georgia, serif;
  font-size: 32px;
  letter-spacing: 0.14em;
  margin-top: 22px;
  transition: letter-spacing 0.45s ease;
}
.panel-light .panel-name { color: var(--dark-stone); }
.panel-dark  .panel-name { color: var(--cream); }
.panel:hover .panel-name { letter-spacing: 0.22em; }

/* ── TAG ── */
.panel-tag {
  font-size: 9.5px;
  font-weight: 300;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  margin-top: 11px;
  transition: opacity 0.4s ease;
}
.panel-light .panel-tag { color: var(--dark-stone); opacity: 0.5; }
.panel-dark  .panel-tag { color: var(--taupe); opacity: 0.5; }
.panel:hover .panel-tag { opacity: 0.85; }

/* ── ENTER CTA ── */
.panel-enter {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 36px;
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.35s ease, transform 0.35s ease;
}
.panel-light .panel-enter { color: var(--dark-stone); }
.panel-dark  .panel-enter { color: var(--taupe); }
.panel:hover .panel-enter { opacity: 1; transform: translateY(0); }

.enter-line {
  display: block;
  height: 0.5px;
  width: 24px;
  transition: width 0.45s ease;
}
.panel-light .enter-line { background: var(--dark-stone); }
.panel-dark  .enter-line { background: var(--taupe); }
.panel:hover .enter-line { width: 40px; }

/* ── SPARK ── */
.spark {
  position: absolute;
  font-size: 10px;
  opacity: 0;
  transition: opacity 0.4s ease;
  font-family: sans-serif;
}
.panel-light .spark { color: var(--taupe); top: 38px; right: 40px; }
.panel-dark  .spark { color: var(--stone); bottom: 38px; right: 38px; }
.panel:hover .spark { opacity: 0.7; }

/* ── CORNER ── */
.corner {
  position: absolute;
  bottom: 34px;
  font-size: 8.5px;
  font-weight: 300;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  opacity: 0.28;
  font-family: 'Inter', sans-serif;
}
.panel-light .corner { color: var(--dark-stone); right: 32px; }
.panel-dark  .corner { color: var(--taupe); left: 32px; }

/* ── SUBTLE GLOW ── */
.panel-light::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 35% 55%, rgba(207,199,188,0.22) 0%, transparent 60%);
  pointer-events: none;
}
.panel-dark::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 65% 45%, rgba(136,128,112,0.07) 0%, transparent 60%);
  pointer-events: none;
}

/* ── MOBILE ── */
@media (max-width: 640px) {
  html, body { overflow: hidden; }
  .split { flex-direction: column; height: 100dvh; }
  .panel:hover { flex: 1; }
  .divider {
    top: 50%; bottom: auto;
    left: 10%; right: 10%;
    width: auto; height: 0.5px;
  }
  .logo-wrap { width: 130px; height: 130px; }
  .logo-wrap img { width: 110px; height: 110px; }
  .panel-name { font-size: 26px; }
  .wordmark-bar { display: none; }
  .corner { display: none; }
}

</style>
</head>
